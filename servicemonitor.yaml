# servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: temporal-monitor
  namespace: temporal-system
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/headless: 'true'
  namespaceSelector:
    matchNames:
      - temporal-system
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
